# ─────────────────────────────────────────────────────────
#  Nginx — Barbearia Thieco Leandro
#  Serve o React SPA + proxy reverso para o Backend
# ─────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compressão ────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Cabeçalhos de segurança ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Limite de upload (importações de histórico podem passar de 1 MB)
    client_max_body_size 20m;

    # ── Proxy da API ──────────────────────────────────────
    # /api/vendas  →  http://backend:3001/vendas  (strip /api)
    location /api/ {
        proxy_pass         http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Propaga erros do backend como JSON (não como página 502 do nginx)
        proxy_intercept_errors off;
    }

    # ── Assets estáticos — cache longo ────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
        try_files      $uri =404;
    }

    # ── SPA — qualquer rota vai para index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Oculta versão do nginx ────────────────────────────
    server_tokens off;
}
