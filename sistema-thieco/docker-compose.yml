# ─────────────────────────────────────────────────────────
#  Barbearia Thieco Leandro — Sistema de Caixa
#  Stack completa: PostgreSQL + Backend + Frontend (Nginx)
#
#  Pré-requisitos:
#    cp .env.example .env   (preencher senhas e segredos)
#    docker compose up -d   (subir tudo)
#
#  Acesso: http://localhost:${APP_PORT:-80}
# ─────────────────────────────────────────────────────────

services:

  # ════════════════════════════════════════════════════════
  #  BANCO DE DADOS
  # ════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: thieco_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Encoding correto para nomes com acentos (Kauã, Tamboré…)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=pt_BR.UTF-8 --lc-ctype=pt_BR.UTF-8"
      TZ: America/Sao_Paulo

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Porta exposta apenas para acesso local com DBeaver/psql durante desenvolvimento
    # Remova em produção real
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 20s

    networks:
      - thieco_net

  # ════════════════════════════════════════════════════════
  #  BACKEND — Node.js / Express
  # ════════════════════════════════════════════════════════
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: thieco_api
    restart: unless-stopped

    environment:
      NODE_ENV:      production
      PORT:          3001

      # Banco — aponta para o service "postgres" na rede interna
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}

      # Autenticação JWT
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}

      # Módulo Admin (Gestão de Time)
      ADMIN_PIN: ${ADMIN_PIN:-2121}

      TZ: America/Sao_Paulo

    depends_on:
      postgres:
        condition: service_healthy

    # Backend NÃO exposto diretamente — só via proxy Nginx
    expose:
      - "3001"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 40s

    networks:
      - thieco_net

  # ════════════════════════════════════════════════════════
  #  FRONTEND — React (Vite build) + Nginx
  # ════════════════════════════════════════════════════════
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: thieco_web
    restart: unless-stopped

    ports:
      - "${APP_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

    networks:
      - thieco_net

# ─────────────────────────────────────────────────────────
#  VOLUMES
# ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: thieco_postgres_data
    driver: local

# ─────────────────────────────────────────────────────────
#  REDE INTERNA
#  Isola os serviços do host — backend e postgres
#  nunca ficam expostos diretamente na internet
# ─────────────────────────────────────────────────────────
networks:
  thieco_net:
    name: thieco_network
    driver: bridge
